<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TabTamer 设置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .checkbox-group label {
      margin-bottom: 0;
      font-weight: normal;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #45a049;
    }
    #status {
      margin-top: 10px;
      color: #4CAF50;
      font-weight: bold;
    }
    .note {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h2>TabTamer 排序设置</h2>
  
  <div class="form-group checkbox-group">
    <input type="checkbox" id="useAi">
    <label for="useAi"><strong>启用 AI 大模型智能排序</strong></label>
  </div>
  
  <div id="aiSettings" style="display: none; border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
    <div class="form-group">
      <label for="apiUrl">API Base URL</label>
      <input type="text" id="apiUrl" placeholder="例如: https://open.bigmodel.cn/api/paas/v4">
      <div class="note">默认使用智谱 AI 接口 (https://open.bigmodel.cn/api/paas/v4)</div>
    </div>
    
    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="输入您的 API Key">
    </div>

    <div class="form-group">
      <label for="model">模型名称 (Model)</label>
      <input type="text" id="model" placeholder="例如: glm-4.7-flash">
    </div>
  </div>

  <button id="saveBtn">保存设置</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
